name: Publish Reports to GitHub Packages

on:
  push:
    tags:
      - 'v*'
      - 'reports-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Type check
        run: yarn check
      
      - name: Configure npm for GitHub Packages
        run: |
          echo "@edgar-treischl:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
      
      - name: Publish to GitHub Packages
        working-directory: packages/reports
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Summary
        run: |
          echo "✅ Published @edgar-treischl/reports@${{ steps.version.outputs.VERSION }}"
          echo "📦 View at: https://github.com/edgar-treischl/dash-magazin/packages/npm/reports"
          echo "📥 Install with: yarn add @edgar-treischl/reports@${{ steps.version.outputs.VERSION }}"


